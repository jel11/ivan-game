<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>STROKA WIN 🎲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === STATE ===
let state = 'start'; // start | playing | warning | ending | dead | win
let frame = 0;
let surviveFrames = 0;
const FPS = 60;
const SURVIVE_DURATION = 35 * FPS;
const WARNING_DURATION = 3 * FPS;

// === PLAYER ===
const player = {
  x: 0, y: 0, size: 0,
  alive: true,
  deathFrame: 0,
  rotation: 0, rotSpeed: 0,
  alpha: 1, scaleAnim: 1,
};

function resetPlayer() {
  player.x = W / 2;
  player.y = H - H * 0.12;
  player.size = Math.min(W, H) * 0.055;
  player.alive = true;
  player.deathFrame = 0;
  player.rotation = 0; player.rotSpeed = 0;
  player.alpha = 1; player.scaleAnim = 1;
}

// === INPUT ===
let targetX = W / 2;
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','a','d','A','D',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && (state === 'start' || state === 'win')) startGame();
});
document.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('mousemove', e => targetX = e.clientX);
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  targetX = e.touches[0].clientX;
}, { passive: false });
canvas.addEventListener('click', () => { if (state === 'start' || state === 'win') startGame(); });
canvas.addEventListener('touchstart', e => {
  if (state === 'start' || state === 'win') startGame();
  targetX = e.touches[0].clientX;
}, { passive: true });

// === OBJECTS ===
let objects = [];
let spawnTimer = 0;
const OBJ_TYPES = ['dice','dice','dice','dice','stroka','ruben','vladimir'];

function getSpawnInterval() {
  return Math.max(20, 65 - surviveFrames / 80);
}

function spawnObject() {
  const type = OBJ_TYPES[Math.floor(Math.random() * OBJ_TYPES.length)];
  const size = type === 'dice' ? player.size * 0.58 : player.size * 0.82;
  return {
    x: size + Math.random() * (W - size * 2),
    y: -size * 2, size, type,
    speed: 2.2 + Math.random() * 2.2 + surviveFrames / 2500,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.07,
  };
}

// === END WALL ===
let endWall = { y: -200, speed: 0, active: false };

// === PARTICLES ===
let particles = [];
function spawnDeathParticles(x, y) {
  for (let i = 0; i < 45; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 9;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      size: 4 + Math.random() * 10,
      color: ['#ff0000','#ffd700','#ff8800','#ff4444','#ffaa00'][Math.floor(Math.random()*5)],
      life: 1, decay: 0.014 + Math.random() * 0.022,
      type: Math.random() < 0.45 ? 'star' : 'circle'
    });
  }
}

let winParticles = [];
function spawnWinParticle() {
  winParticles.push({
    x: Math.random() * W, y: -20,
    vx: (Math.random() - 0.5) * 4,
    vy: 1.5 + Math.random() * 3,
    size: 5 + Math.random() * 12,
    color: ['#4dd0e1','#00bcd4','#80deea','#b2ebf2','#ffffff','#ffd700'][Math.floor(Math.random()*6)],
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.18,
    type: Math.random() < 0.3 ? 'star' : Math.random() < 0.5 ? 'circle' : 'rect'
  });
}

// === BG STARS ===
let bgStars = [];
function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 65; i++) {
    bgStars.push({
      x: Math.random() * W, y: Math.random() * H,
      size: 0.4 + Math.random() * 1.6,
      alpha: 0.2 + Math.random() * 0.6,
      tw: Math.random() * Math.PI * 2
    });
  }
}
initBgStars();

// === DRAW HELPERS ===
function starPath(cx, cy, outerR, innerR, pts, rot = 0) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const a = (i * Math.PI / pts) + rot - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

// === DRAW CHARACTERS ===
function drawArtishchev(x, y, size, rot = 0, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Gold border star
  starPath(x, y, size + 5, (size + 5) * 0.42, 5, rot);
  ctx.fillStyle = '#c8960a';
  ctx.fill();
  // Red star
  ctx.shadowBlur = alpha > 0.4 ? 22 : 0;
  ctx.shadowColor = '#ff3300';
  starPath(x, y, size, size * 0.42, 5, rot);
  const g = ctx.createRadialGradient(x - size*0.15, y - size*0.2, 0, x, y, size);
  g.addColorStop(0, '#ff7777');
  g.addColorStop(0.4, '#dd0000');
  g.addColorStop(1, '#880000');
  ctx.fillStyle = g;
  ctx.fill();
  // Shine
  ctx.shadowBlur = 0;
  starPath(x - size*0.1, y - size*0.12, size * 0.48, size * 0.2, 5, rot);
  ctx.fillStyle = 'rgba(255,200,200,0.18)';
  ctx.fill();
  ctx.restore();
}

function drawDiceObj(x, y, size, rot = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(-size, -size, size*2, size*2, size*0.28);
  else ctx.rect(-size, -size, size*2, size*2);
  ctx.fillStyle = '#f2f2f2'; ctx.fill();
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#1a1a2e';
  const d = size * 0.13;
  [[-0.5,-0.5],[0.5,-0.5],[-0.5,0],[0.5,0],[-0.5,0.5],[0.5,0.5]].forEach(([dx,dy]) => {
    ctx.beginPath(); ctx.arc(dx*size, dy*size, d, 0, Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawStrokaAvatar(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = '#0a1e2e'; ctx.fillRect(-size, -size, size*2, size*2);
  // body triangle
  ctx.fillStyle = '#14404f';
  ctx.beginPath(); ctx.moveTo(-size*0.72, size); ctx.lineTo(0, -size*0.05); ctx.lineTo(size*0.72, size); ctx.closePath(); ctx.fill();
  // hood
  ctx.beginPath(); ctx.arc(0, -size*0.28, size*0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a2a3a';
  ctx.beginPath(); ctx.arc(0, -size*0.28, size*0.36, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#4dd0e1';
  ctx.shadowBlur = 8; ctx.shadowColor = '#4dd0e1';
  [-0.17, 0.17].forEach(dx => {
    ctx.beginPath(); ctx.ellipse(dx*size, -size*0.28, size*0.08, size*0.05, 0, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#d8f0f8';
  ctx.font = `bold ${size*0.25}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('STROKA', 0, size*0.38);
  ctx.restore();
  // border
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = 2.5; ctx.stroke();
}

function drawRubenAvatar(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.clip();
  const bg = ctx.createLinearGradient(0, -size, 0, size);
  bg.addColorStop(0, '#777'); bg.addColorStop(0.5, '#444'); bg.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = bg; ctx.fillRect(-size, -size, size*2, size*2);
  // silhouette
  ctx.fillStyle = '#0e0e0e';
  ctx.beginPath(); ctx.arc(size*0.08, -size*0.22, size*0.37, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-size*0.55, size);
  ctx.quadraticCurveTo(-size*0.3, size*0.1, size*0.08, 0);
  ctx.quadraticCurveTo(size*0.38, size*0.1, size*0.58, size);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2; ctx.stroke();
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#eee'; ctx.font = `bold ${size*0.27}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Ruben', 0, size*0.64);
  ctx.restore();
}

function drawVladimirAvatar(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.clip();
  const bg = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
  bg.addColorStop(0, '#507060'); bg.addColorStop(1, '#283828');
  ctx.fillStyle = bg; ctx.fillRect(-size, -size, size*2, size*2);
  ctx.fillStyle = '#0f0f0f';
  ctx.beginPath(); ctx.arc(0, -size*0.15, size*0.44, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'white'; ctx.font = `bold italic ${size*0.32}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GS', 0, -size*0.15);
  ctx.restore();
  ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.strokeStyle = '#6aaa7a'; ctx.lineWidth = 2; ctx.stroke();
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#aaffbb'; ctx.font = `bold ${size*0.23}px Arial`;
  ctx.textAlign = 'center'; ctx.fillText('dev', 0, size*0.68);
  ctx.restore();
}

function drawObj(o) {
  switch(o.type) {
    case 'dice': drawDiceObj(o.x, o.y, o.size, o.rotation); break;
    case 'stroka': drawStrokaAvatar(o.x, o.y, o.size); break;
    case 'ruben': drawRubenAvatar(o.x, o.y, o.size); break;
    case 'vladimir': drawVladimirAvatar(o.x, o.y, o.size); break;
  }
}

// === COLLISION ===
function collides(o) {
  const dx = player.x - o.x, dy = player.y - o.y;
  return Math.sqrt(dx*dx + dy*dy) < (player.size * 0.62 + o.size * 0.62);
}

// === GAME ===
let warningTimer = 0;

function startGame() {
  state = 'playing'; frame = 0; surviveFrames = 0;
  objects = []; particles = []; winParticles = [];
  spawnTimer = 0; warningTimer = 0;
  endWall = { y: -200, speed: 0, active: false };
  targetX = W / 2;
  resetPlayer();
}

function triggerDeath() {
  player.alive = false;
  spawnDeathParticles(player.x, player.y);
  state = 'dead';
}

// === UPDATE ===
function update() {
  frame++;

  const kspeed = 8;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetX -= kspeed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) targetX += kspeed;
  targetX = Math.max(player.size, Math.min(W - player.size, targetX));

  if (['playing','warning','ending'].includes(state)) {
    player.x += (targetX - player.x) * 0.18;
    player.x = Math.max(player.size, Math.min(W - player.size, player.x));
  }

  if (state === 'playing') {
    surviveFrames++;
    spawnTimer--;
    if (spawnTimer <= 0) { objects.push(spawnObject()); spawnTimer = getSpawnInterval(); }
    for (let i = objects.length - 1; i >= 0; i--) {
      const o = objects[i]; o.y += o.speed; o.rotation += o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y > H + 70) objects.splice(i, 1);
    }
    if (surviveFrames >= SURVIVE_DURATION) { state = 'warning'; warningTimer = WARNING_DURATION; }
  }

  if (state === 'warning') {
    surviveFrames++;
    warningTimer--;
    spawnTimer--;
    if (spawnTimer <= 0) { objects.push(spawnObject()); spawnTimer = 32; }
    for (let i = objects.length - 1; i >= 0; i--) {
      const o = objects[i]; o.y += o.speed; o.rotation += o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y > H + 70) objects.splice(i, 1);
    }
    if (warningTimer <= 0) {
      state = 'ending';
      endWall.y = -150; endWall.speed = 1.0; endWall.active = true;
    }
  }

  if (state === 'ending') {
    surviveFrames++;
    spawnTimer--;
    if (spawnTimer <= 0) { objects.push(spawnObject()); spawnTimer = 55; }
    for (let i = objects.length - 1; i >= 0; i--) {
      const o = objects[i]; o.y += o.speed; o.rotation += o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y > H + 70) objects.splice(i, 1);
    }
    endWall.y += endWall.speed;
    endWall.speed = Math.min(endWall.speed * 1.012, 18);
    // wall bottom touches player
    const diceSize = Math.min(W, H) * 0.038;
    if (endWall.y + diceSize + 14 >= player.y - player.size * 0.9) {
      triggerDeath(); return;
    }
  }

  if (state === 'dead') {
    player.deathFrame++;
    player.rotSpeed += 0.04; player.rotation += player.rotSpeed;
    player.alpha = Math.max(0, 1 - player.deathFrame / 55);
    player.scaleAnim = 1 + player.deathFrame * 0.045;
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.28; p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
    if (player.deathFrame >= 120 || (player.deathFrame >= 80 && particles.length === 0)) {
      state = 'win';
    }
  }

  if (state === 'win') {
    if (frame % 2 === 0) spawnWinParticle();
    for (let i = winParticles.length - 1; i >= 0; i--) {
      const p = winParticles[i];
      p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
      if (p.y > H + 20) winParticles.splice(i, 1);
    }
  }
}

// === DRAW ===
function draw() {
  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080815'); bg.addColorStop(1, '#120808');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  bgStars.forEach(s => {
    s.tw += 0.025;
    const a = s.alpha * (0.7 + 0.3 * Math.sin(s.tw));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
  });

  if (state === 'start') { drawStartScreen(); return; }

  // Falling objects (all states except win)
  if (state !== 'win') objects.forEach(drawObj);

  // End wall
  if ((state === 'ending' || state === 'dead') && endWall.active) drawEndWallVisual();

  // Player alive
  if (['playing','warning','ending'].includes(state)) {
    drawArtishchev(player.x, player.y, player.size, player.rotation);
  }

  // Dying player
  if (state === 'dead') {
    if (player.alpha > 0) {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.scale(player.scaleAnim, player.scaleAnim);
      ctx.translate(-player.x, -player.y);
      drawArtishchev(player.x, player.y, player.size, player.rotation, player.alpha);
      ctx.restore();
    }
    particles.forEach(drawParticle);
  }

  // Warning flash & text
  if (state === 'warning') {
    if (Math.floor(frame / 7) % 2 === 0) {
      ctx.fillStyle = 'rgba(255,40,0,0.18)'; ctx.fillRect(0, 0, W, H);
    }
    const pulse = 1 + 0.06 * Math.sin(frame * 0.22);
    ctx.save();
    ctx.translate(W/2, H/2); ctx.scale(pulse, pulse);
    ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(-W*0.48, -54, W*0.96, 108);
    ctx.font = `bold ${Math.min(W*0.072, 38)}px 'Arial Black', Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff3300';
    ctx.fillStyle = '#ff4400';
    ctx.fillText('⚠  СТРОКА  INCOMING  ⚠', 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // HUD
  if (['playing','warning','ending'].includes(state)) {
    const secs = Math.floor(surviveFrames / FPS);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(10, 10, 185, 38, 8);
    else ctx.rect(10, 10, 185, 38);
    ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold 18px Arial`; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(`⏱  Выжил: ${secs} с`, 20, 29);
  }

  if (state === 'win') drawWinScreen();
}

function drawEndWallVisual() {
  const ds = Math.min(W, H) * 0.038;
  const spacing = ds * 2 + 5;
  const count = Math.ceil(W / spacing) + 2;
  const wallH = ds * 2 + 22;

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, endWall.y - wallH/2 - 12, W, wallH + 24);

  // red glow lines
  ctx.strokeStyle = 'rgba(255,20,0,0.7)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, endWall.y - wallH/2 - 12); ctx.lineTo(W, endWall.y - wallH/2 - 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, endWall.y + wallH/2 + 12); ctx.lineTo(W, endWall.y + wallH/2 + 12); ctx.stroke();

  for (let i = 0; i < count; i++) {
    drawDiceObj(i * spacing + ds, endWall.y, ds, frame * 0.03 + i * 0.15);
  }

  // "СТРОКА" label on the wall
  ctx.fillStyle = 'rgba(255,60,0,0.9)';
  ctx.font = `bold ${Math.min(W*0.055, 28)}px 'Arial Black', Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 10; ctx.shadowColor = '#ff2200';
  ctx.fillText('С Т Р О К А', W/2, endWall.y);
  ctx.shadowBlur = 0;
}

function drawParticle(p) {
  ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
  ctx.shadowBlur = 6; ctx.shadowColor = p.color;
  if (p.type === 'star') { starPath(p.x, p.y, p.size, p.size*0.42, 5); ctx.fill(); }
  else { ctx.beginPath(); ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function drawStartScreen() {
  ctx.textAlign = 'center';

  // Title
  const fs = Math.min(W*0.13, 66);
  ctx.font = `bold ${fs}px 'Arial Black', Arial`;
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 25; ctx.shadowColor = '#ff3300';
  ctx.fillStyle = '#ffd700'; ctx.fillText('АРТИЩЕВ', W/2, H*0.22);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffffff'; ctx.fillText('DODGE', W/2, H*0.33);

  // STROKA logo
  const ls = Math.min(W, H) * 0.11;
  drawStrokaAvatar(W/2, H*0.52, ls);

  // Subtitle
  ctx.fillStyle = '#dddddd'; ctx.font = `${Math.min(W*0.046, 21)}px Arial`;
  ctx.fillText('Уворачивайся от кубиков!', W/2, H*0.69);
  ctx.fillStyle = '#888888'; ctx.font = `${Math.min(W*0.036, 16)}px Arial`;
  ctx.fillText('Но от STROKA не уйдёшь...', W/2, H*0.75);

  // Blink to start
  const blink = Math.floor(frame / 32) % 2;
  ctx.fillStyle = blink ? '#ffd700' : '#ff6600';
  ctx.font = `bold ${Math.min(W*0.055, 24)}px Arial`;
  ctx.fillText('Нажми / тапни чтобы начать', W/2, H*0.88);
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(0, 8, 25, 0.93)'; ctx.fillRect(0, 0, W, H);

  // Win particles
  winParticles.forEach(p => {
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
    ctx.globalAlpha = Math.min(1, p.life * 1.5); ctx.fillStyle = p.color;
    if (p.type === 'star') { starPath(0, 0, p.size, p.size*0.4, 5); ctx.fill(); }
    else if (p.type === 'rect') { ctx.fillRect(-p.size/2, -p.size/3, p.size, p.size*0.65); }
    else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  // STROKA logo
  const ls = Math.min(W, H) * 0.13;
  drawStrokaAvatar(W/2, H*0.26, ls);

  // WIN text
  const pulse = 1 + 0.06 * Math.sin(frame * 0.09);
  const fontSize = Math.min(W * 0.21, 108);
  ctx.save();
  ctx.translate(W/2, H*0.5); ctx.scale(pulse, pulse);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = `bold ${fontSize}px 'Arial Black', Arial`;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillText('STROKA', 5, 5); ctx.fillText('WIN!', 5, fontSize * 1.08 + 5);
  // gradient top line
  const tg1 = ctx.createLinearGradient(-W*0.3, 0, W*0.3, 0);
  tg1.addColorStop(0, '#4dd0e1'); tg1.addColorStop(0.5, '#ffffff'); tg1.addColorStop(1, '#4dd0e1');
  ctx.fillStyle = tg1; ctx.fillText('STROKA', 0, 0);
  // gold bottom line
  const tg2 = ctx.createLinearGradient(-W*0.3, 0, W*0.3, 0);
  tg2.addColorStop(0, '#ffd700'); tg2.addColorStop(0.5, '#ffffff'); tg2.addColorStop(1, '#ffd700');
  ctx.fillStyle = tg2; ctx.fillText('WIN!', 0, fontSize * 1.08);
  ctx.restore();

  // Stats
  const secs = Math.floor(surviveFrames / FPS);
  ctx.fillStyle = '#aaaaaa'; ctx.font = `${Math.min(W*0.042, 19)}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(`Артищев уворачивался ${secs} секунд`, W/2, H*0.74);
  ctx.fillStyle = '#666';
  ctx.font = `${Math.min(W*0.036, 16)}px Arial`;
  ctx.fillText('но 300к так и не заплатил 😄', W/2, H*0.8);

  // Restart hint
  const blink = Math.floor(frame / 42) % 2;
  ctx.fillStyle = blink ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.25)';
  ctx.font = `${Math.min(W*0.037, 16)}px Arial`;
  ctx.fillText('Нажми / тапни чтобы сыграть снова', W/2, H*0.92);
}

// === LOOP ===
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
