<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>STROKA WIN 🎲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  overflow: hidden;
  touch-action: none;
  position: fixed;
  width: 100%; height: 100%;
  /* Prevent iOS scroll bounce */
  overscroll-behavior: none;
}
canvas { display: block; }
/* Safe-area probe — lets JS read iPhone home-bar height */
#sab { position: fixed; bottom: 0; left: 0; width: 1px;
       height: env(safe-area-inset-bottom, 0px); pointer-events: none; }
</style>
</head>
<body>
<div id="sab"></div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const sabEl  = document.getElementById('sab');

// CSS pixel dimensions (game logic uses these)
let W, H;
// Safe-area offsets in CSS px
let safeTop = 0, safeBot = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  // Apply DPR scale once — all draw calls use CSS px
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Read safe-area insets
  safeBot = sabEl.getBoundingClientRect().height || 0;
  safeTop = parseInt(getComputedStyle(document.documentElement)
              .getPropertyValue('--sat') || '0') || 0;
}
resize();
window.addEventListener('resize', () => { resize(); resetPlayer(); initBgStars(); });

// Shorthand helpers
const isMobile = () => ('ontouchstart' in window);
const isLandscape = () => W > H;
// Base unit for sizing everything: shorter screen side
const u = () => Math.min(W, H);

// ─── STATE ────────────────────────────────────────────────────
let state = 'start'; // start | playing | warning | ending | dead | win
let frame = 0, surviveFrames = 0;
const FPS = 60;
const SURVIVE_DURATION = 35 * FPS;
const WARNING_DURATION =  3 * FPS;

// ─── PLAYER ───────────────────────────────────────────────────
const player = {
  x: 0, y: 0, size: 0,
  alive: true, deathFrame: 0,
  rotation: 0, rotSpeed: 0, alpha: 1, scaleAnim: 1,
};

function resetPlayer() {
  player.x        = W / 2;
  // keep above home bar + a bit of breathing room
  player.y        = H - Math.max(H * 0.11, safeBot + 55);
  player.size     = u() * 0.055;
  player.alive    = true;
  player.deathFrame = 0;
  player.rotation = player.rotSpeed = 0;
  player.alpha = 1; player.scaleAnim = 1;
}

// ─── INPUT ────────────────────────────────────────────────────
let targetX = W / 2;
const keys  = {};

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','a','d','A','D',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && (state === 'start' || state === 'win')) startGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => { targetX = e.clientX; });

// Touch: track finger position for movement
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  targetX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  targetX = e.touches[0].clientX;
  if (state === 'start' || state === 'win') startGame();
}, { passive: true });

canvas.addEventListener('click', () => {
  if (state === 'start' || state === 'win') startGame();
});

// ─── FALLING OBJECTS ──────────────────────────────────────────
let objects = [], spawnTimer = 0;
const OBJ_TYPES = ['dice','dice','dice','dice','stroka','ruben','vladimir'];

function spawnInterval() { return Math.max(20, 65 - surviveFrames / 80); }

function spawnObject() {
  const type = OBJ_TYPES[Math.floor(Math.random() * OBJ_TYPES.length)];
  const sz   = type === 'dice' ? player.size * 0.58 : player.size * 0.82;
  return {
    x: sz + Math.random() * (W - sz * 2),
    y: -sz * 2, size: sz, type,
    speed: 2.2 + Math.random() * 2.2 + surviveFrames / 2500,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.07,
  };
}

// ─── END WALL ─────────────────────────────────────────────────
let endWall = { y: -200, speed: 0, active: false };
const wallHeight = () => u() * 0.30;

// ─── PARTICLES ────────────────────────────────────────────────
let particles = [];
function spawnDeathParticles(x, y) {
  for (let i = 0; i < 45; i++) {
    const a = Math.random() * Math.PI * 2, spd = 1.5 + Math.random() * 9;
    particles.push({
      x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 2,
      size: 4 + Math.random() * 10,
      color: ['#ff0000','#ffd700','#ff8800','#ff4444','#ffaa00'][Math.floor(Math.random()*5)],
      life: 1, decay: 0.014 + Math.random() * 0.022,
      type: Math.random() < 0.45 ? 'star' : 'circle',
    });
  }
}

let winParticles = [];
function spawnWinParticle() {
  winParticles.push({
    x: Math.random() * W, y: -20,
    vx: (Math.random() - 0.5) * 4, vy: 1.5 + Math.random() * 3,
    size: 5 + Math.random() * 12,
    color: ['#4dd0e1','#00bcd4','#80deea','#b2ebf2','#ffffff','#ffd700'][Math.floor(Math.random()*6)],
    rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random()-0.5)*0.18,
    type: Math.random()<0.3 ? 'star' : Math.random()<0.5 ? 'circle' : 'rect',
  });
}

// ─── BG STARS ─────────────────────────────────────────────────
let bgStars = [];
function initBgStars() {
  bgStars = Array.from({length: 65}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    size: 0.4 + Math.random()*1.6,
    alpha: 0.2 + Math.random()*0.6,
    tw: Math.random()*Math.PI*2,
  }));
}
initBgStars();

// ─── DRAW HELPERS ─────────────────────────────────────────────
function starPath(cx, cy, outerR, innerR, pts, rot = 0) {
  ctx.beginPath();
  for (let i = 0; i < pts*2; i++) {
    const a = (i*Math.PI/pts) + rot - Math.PI/2;
    const r = i%2===0 ? outerR : innerR;
    i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a))
          : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath();
}

function scaledFont(sizePx, weight = '', family = 'Arial') {
  return `${weight} ${Math.round(sizePx)}px ${family}`.trim();
}

// ─── CHARACTERS ───────────────────────────────────────────────
function drawArtishchev(x, y, size, rot=0, alpha=1) {
  ctx.save(); ctx.globalAlpha = alpha;
  starPath(x, y, size+5, (size+5)*0.42, 5, rot);
  ctx.fillStyle = '#c8960a'; ctx.fill();
  ctx.shadowBlur = alpha>0.4 ? 22 : 0; ctx.shadowColor = '#ff3300';
  starPath(x, y, size, size*0.42, 5, rot);
  const g = ctx.createRadialGradient(x-size*0.15, y-size*0.2, 0, x, y, size);
  g.addColorStop(0,'#ff7777'); g.addColorStop(0.4,'#dd0000'); g.addColorStop(1,'#880000');
  ctx.fillStyle = g; ctx.fill();
  ctx.shadowBlur = 0;
  starPath(x-size*0.1, y-size*0.12, size*0.48, size*0.2, 5, rot);
  ctx.fillStyle = 'rgba(255,200,200,0.18)'; ctx.fill();
  ctx.restore();
}

function drawDiceObj(x, y, size, rot=0) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.shadowBlur=8; ctx.shadowColor='rgba(0,0,0,0.6)';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(-size,-size,size*2,size*2,size*0.28)
                : ctx.rect(-size,-size,size*2,size*2);
  ctx.fillStyle='#f2f2f2'; ctx.fill();
  ctx.strokeStyle='#bbb'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.shadowBlur=0; ctx.fillStyle='#1a1a2e';
  const d=size*0.13;
  [[-0.5,-0.5],[0.5,-0.5],[-0.5,0],[0.5,0],[-0.5,0.5],[0.5,0.5]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(dx*size,dy*size,d,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}

function drawStrokaAvatar(x, y, size) {
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.clip();
  ctx.fillStyle='#0a1e2e'; ctx.fillRect(-size,-size,size*2,size*2);
  ctx.fillStyle='#14404f';
  ctx.beginPath(); ctx.moveTo(-size*0.72,size); ctx.lineTo(0,-size*0.05); ctx.lineTo(size*0.72,size); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-size*0.28,size*0.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a2a3a';
  ctx.beginPath(); ctx.arc(0,-size*0.28,size*0.36,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4dd0e1'; ctx.shadowBlur=8; ctx.shadowColor='#4dd0e1';
  [-0.17,0.17].forEach(dx=>{
    ctx.beginPath(); ctx.ellipse(dx*size,-size*0.28,size*0.08,size*0.05,0,0,Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur=0;
  ctx.fillStyle='#d8f0f8'; ctx.font=scaledFont(size*0.25,'bold'); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('STROKA',0,size*0.38);
  ctx.restore();
  ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2);
  ctx.strokeStyle='#4dd0e1'; ctx.lineWidth=2.5; ctx.stroke();
}

function drawRubenAvatar(x, y, size) {
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.clip();
  const bg=ctx.createLinearGradient(0,-size,0,size);
  bg.addColorStop(0,'#777'); bg.addColorStop(0.5,'#444'); bg.addColorStop(1,'#1a1a1a');
  ctx.fillStyle=bg; ctx.fillRect(-size,-size,size*2,size*2);
  ctx.fillStyle='#0e0e0e';
  ctx.beginPath(); ctx.arc(size*0.08,-size*0.22,size*0.37,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-size*0.55,size);
  ctx.quadraticCurveTo(-size*0.3,size*0.1,size*0.08,0);
  ctx.quadraticCurveTo(size*0.38,size*0.1,size*0.58,size);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2);
  ctx.strokeStyle='#888'; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#eee'; ctx.font=scaledFont(size*0.27,'bold'); ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('Ruben',0,size*0.64);
  ctx.restore();
}

function drawVladimirAvatar(x, y, size) {
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,size,0,Math.PI*2); ctx.clip();
  const bg=ctx.createRadialGradient(0,0,0,0,0,size);
  bg.addColorStop(0,'#507060'); bg.addColorStop(1,'#283828');
  ctx.fillStyle=bg; ctx.fillRect(-size,-size,size*2,size*2);
  ctx.fillStyle='#0f0f0f';
  ctx.beginPath(); ctx.arc(0,-size*0.15,size*0.44,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.font=scaledFont(size*0.32,'bold italic','serif');
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('GS',0,-size*0.15);
  ctx.restore();
  ctx.beginPath(); ctx.arc(x,y,size,0,Math.PI*2);
  ctx.strokeStyle='#6aaa7a'; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#aaffbb'; ctx.font=scaledFont(size*0.23,'bold');
  ctx.textAlign='center'; ctx.fillText('dev',0,size*0.68);
  ctx.restore();
}

function drawObj(o) {
  switch(o.type) {
    case 'dice':     drawDiceObj(o.x,o.y,o.size,o.rotation); break;
    case 'stroka':   drawStrokaAvatar(o.x,o.y,o.size); break;
    case 'ruben':    drawRubenAvatar(o.x,o.y,o.size); break;
    case 'vladimir': drawVladimirAvatar(o.x,o.y,o.size); break;
  }
}

// ─── COLLISION ────────────────────────────────────────────────
function collides(o) {
  const dx=player.x-o.x, dy=player.y-o.y;
  return Math.sqrt(dx*dx+dy*dy) < (player.size*0.62 + o.size*0.62);
}

// ─── GAME FLOW ────────────────────────────────────────────────
let warningTimer = 0;

function startGame() {
  state='playing'; frame=0; surviveFrames=0;
  objects=[]; particles=[]; winParticles=[];
  spawnTimer=0; warningTimer=0;
  endWall={y:-200, speed:0, active:false};
  targetX=W/2;
  resetPlayer();
}

function triggerDeath() {
  player.alive=false;
  spawnDeathParticles(player.x, player.y);
  state='dead';
}

// ─── UPDATE ───────────────────────────────────────────────────
function update() {
  frame++;

  // Keyboard movement
  const kspeed = Math.max(6, W * 0.018);
  if (keys['ArrowLeft']||keys['a']||keys['A']) targetX -= kspeed;
  if (keys['ArrowRight']||keys['d']||keys['D']) targetX += kspeed;
  targetX = Math.max(player.size, Math.min(W-player.size, targetX));

  if (['playing','warning','ending'].includes(state)) {
    player.x += (targetX - player.x) * 0.18;
    player.x = Math.max(player.size, Math.min(W-player.size, player.x));
  }

  if (state === 'playing') {
    surviveFrames++;
    spawnTimer--;
    if (spawnTimer<=0) { objects.push(spawnObject()); spawnTimer=spawnInterval(); }
    for (let i=objects.length-1; i>=0; i--) {
      const o=objects[i]; o.y+=o.speed; o.rotation+=o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y>H+70) objects.splice(i,1);
    }
    if (surviveFrames>=SURVIVE_DURATION) { state='warning'; warningTimer=WARNING_DURATION; }
  }

  if (state === 'warning') {
    surviveFrames++;
    warningTimer--;
    spawnTimer--;
    if (spawnTimer<=0) { objects.push(spawnObject()); spawnTimer=32; }
    for (let i=objects.length-1; i>=0; i--) {
      const o=objects[i]; o.y+=o.speed; o.rotation+=o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y>H+70) objects.splice(i,1);
    }
    if (warningTimer<=0) {
      state='ending';
      endWall.y = -wallHeight()/2 - 10;
      endWall.speed=1.0; endWall.active=true;
    }
  }

  if (state === 'ending') {
    surviveFrames++;
    spawnTimer--;
    if (spawnTimer<=0) { objects.push(spawnObject()); spawnTimer=55; }
    for (let i=objects.length-1; i>=0; i--) {
      const o=objects[i]; o.y+=o.speed; o.rotation+=o.rotSpeed;
      if (collides(o)) { triggerDeath(); return; }
      if (o.y>H+70) objects.splice(i,1);
    }
    endWall.y += endWall.speed;
    endWall.speed = Math.min(endWall.speed*1.012, 18);
    if (endWall.y + wallHeight()/2 >= player.y - player.size*0.9) { triggerDeath(); return; }
  }

  if (state === 'dead') {
    player.deathFrame++;
    player.rotSpeed+=0.04; player.rotation+=player.rotSpeed;
    player.alpha = Math.max(0, 1-player.deathFrame/55);
    player.scaleAnim = 1+player.deathFrame*0.045;
    for (let i=particles.length-1; i>=0; i--) {
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.28; p.life-=p.decay;
      if (p.life<=0) particles.splice(i,1);
    }
    if (player.deathFrame>=120 || (player.deathFrame>=80&&particles.length===0)) state='win';
  }

  if (state === 'win') {
    if (frame%2===0) spawnWinParticle();
    for (let i=winParticles.length-1; i>=0; i--) {
      const p=winParticles[i];
      p.x+=p.vx; p.y+=p.vy; p.rotation+=p.rotSpeed;
      if (p.y>H+20) winParticles.splice(i,1);
    }
  }
}

// ─── DRAW ─────────────────────────────────────────────────────
function draw() {
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#080815'); bg.addColorStop(1,'#120808');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  bgStars.forEach(s=>{
    s.tw+=0.025;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha*(0.7+0.3*Math.sin(s.tw))})`; ctx.fill();
  });

  if (state==='start') { drawStartScreen(); return; }

  if (state!=='win') objects.forEach(drawObj);

  if ((state==='ending'||state==='dead') && endWall.active) drawEndWallVisual();

  if (['playing','warning','ending'].includes(state))
    drawArtishchev(player.x, player.y, player.size, player.rotation);

  if (state==='dead') {
    if (player.alpha>0) {
      ctx.save();
      ctx.translate(player.x,player.y); ctx.scale(player.scaleAnim,player.scaleAnim); ctx.translate(-player.x,-player.y);
      drawArtishchev(player.x,player.y,player.size,player.rotation,player.alpha);
      ctx.restore();
    }
    particles.forEach(drawParticle);
  }

  if (state==='warning') {
    if (Math.floor(frame/7)%2===0) { ctx.fillStyle='rgba(255,40,0,0.18)'; ctx.fillRect(0,0,W,H); }
    const bannerH = Math.max(70, H*0.13);
    const pulse = 1+0.06*Math.sin(frame*0.22);
    ctx.save();
    ctx.translate(W/2, H/2); ctx.scale(pulse,pulse);
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(-W*0.48,-bannerH/2,W*0.96,bannerH);
    const warnFs = Math.min(W*0.072, 36, bannerH*0.45);
    ctx.font=scaledFont(warnFs,'bold',"'Arial Black',Arial");
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=12; ctx.shadowColor='#ff3300';
    ctx.fillStyle='#ff4400';
    ctx.fillText('⚠  СТРОКА  INCOMING  ⚠',0,0);
    ctx.shadowBlur=0;
    ctx.restore();
  }

  if (['playing','warning','ending'].includes(state)) drawHUD();
  if (state==='win') drawWinScreen();
}

// ─── HUD ──────────────────────────────────────────────────────
function drawHUD() {
  const secs = Math.floor(surviveFrames/FPS);
  const fs   = Math.max(13, Math.min(W*0.042, 18));
  const topY = safeTop + 10;
  const label = `⏱  Выжил: ${secs} с`;
  ctx.font = scaledFont(fs, 'bold');
  const tw = ctx.measureText(label).width;
  const padX = 14, padY = 10;
  const boxW = tw + padX*2, boxH = fs + padY*2;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(10, topY, boxW, boxH, 8)
                : ctx.rect(10, topY, boxW, boxH);
  ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(label, 10+padX, topY+padY+fs/2);

  // Mobile swipe hint (first 5 s only)
  if (isMobile() && surviveFrames < 5*FPS && state==='playing') {
    const hintFs = Math.max(11, u()*0.032);
    ctx.font = scaledFont(hintFs);
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillStyle = `rgba(255,255,255,${0.5*(1-surviveFrames/(5*FPS))})`;
    ctx.fillText('← Тяни пальцем →', W/2, H - safeBot - 10);
  }
}

// ─── RUBEN WALL ───────────────────────────────────────────────
function drawEndWallVisual() {
  const wh  = wallHeight();
  const y   = endWall.y;
  const top = y - wh/2;

  ctx.save();
  ctx.beginPath(); ctx.rect(0, top, W, wh); ctx.clip();

  // B&W sky/water
  const sg=ctx.createLinearGradient(0,top,0,top+wh);
  sg.addColorStop(0,'#6a6a6a'); sg.addColorStop(0.35,'#999');
  sg.addColorStop(0.55,'#777'); sg.addColorStop(1,'#2a2a2a');
  ctx.fillStyle=sg; ctx.fillRect(0,top,W,wh);

  // Water shimmer lines
  ctx.strokeStyle='rgba(220,220,220,0.12)'; ctx.lineWidth=1;
  for (let i=0;i<9;i++) {
    const ly=top+wh*0.48+i*wh*0.068;
    const ww=W*(0.4+Math.random()*0.5), lx=Math.random()*(W-ww);
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+ww,ly); ctx.stroke();
  }

  // Pier floor
  const fg=ctx.createLinearGradient(0,top+wh*0.6,0,top+wh);
  fg.addColorStop(0,'#3a3a3a'); fg.addColorStop(1,'#111');
  ctx.fillStyle=fg; ctx.fillRect(0,top+wh*0.62,W,wh*0.38);

  // Railing post
  ctx.strokeStyle='#aaa'; ctx.lineWidth=Math.max(2,wh*0.018);
  ctx.beginPath(); ctx.moveTo(W*0.82,top+wh*0.22); ctx.lineTo(W*0.82,top+wh*0.68); ctx.stroke();
  ctx.beginPath(); ctx.arc(W*0.82,top+wh*0.19,wh*0.038,0,Math.PI*2); ctx.fillStyle='#bbb'; ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=Math.max(1.5,wh*0.012);
  ctx.beginPath(); ctx.moveTo(W*0.6,top+wh*0.35); ctx.lineTo(W*0.95,top+wh*0.35); ctx.stroke();

  // Silhouette
  const cx=W*0.42, cy=y+wh*0.08, sh=wh*0.72;
  ctx.fillStyle='#080808';
  ctx.beginPath(); ctx.arc(cx,cy-sh*0.28,sh*0.26,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx-sh*0.38,top+wh);
  ctx.quadraticCurveTo(cx-sh*0.22,cy-sh*0.04,cx,cy-sh*0.04);
  ctx.quadraticCurveTo(cx+sh*0.22,cy-sh*0.04,cx+sh*0.38,top+wh);
  ctx.closePath(); ctx.fill();

  // "Ruben ★" text
  const ts=Math.min(wh*0.2,28);
  ctx.fillStyle='rgba(255,255,255,0.96)';
  ctx.font=scaledFont(ts,'bold'); ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText('Ruben ★', W*0.04, top+wh-wh*0.22);
  ctx.fillStyle='rgba(200,200,200,0.75)';
  ctx.font=scaledFont(ts*0.68); ctx.fillText('был(а) недавно', W*0.04, top+wh-wh*0.06);

  ctx.restore();

  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,top); ctx.lineTo(W,top); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,top+wh); ctx.lineTo(W,top+wh); ctx.stroke();
}

// ─── PARTICLES ────────────────────────────────────────────────
function drawParticle(p) {
  ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
  ctx.shadowBlur=6; ctx.shadowColor=p.color;
  p.type==='star' ? (starPath(p.x,p.y,p.size,p.size*0.42,5), ctx.fill())
                  : (ctx.beginPath(), ctx.arc(p.x,p.y,p.size/2,0,Math.PI*2), ctx.fill());
  ctx.restore();
}

// ─── START SCREEN ─────────────────────────────────────────────
function drawStartScreen() {
  const land = isLandscape();

  if (land) {
    // ── Landscape: logo left, text right ──
    const ls = Math.min(H*0.32, W*0.18);
    drawStrokaAvatar(W*0.22, H*0.48, ls);

    ctx.textAlign='center';
    const titleFs = Math.min(H*0.14, W*0.07, 52);
    ctx.font=scaledFont(titleFs,'bold',"'Arial Black',Arial"); ctx.textBaseline='middle';
    ctx.shadowBlur=20; ctx.shadowColor='#ff3300';
    ctx.fillStyle='#ffd700'; ctx.fillText('АРТИЩЕВ', W*0.65, H*0.22);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.fillText('DODGE', W*0.65, H*0.38);

    ctx.fillStyle='#ddd'; ctx.font=scaledFont(Math.min(H*0.055, 18));
    ctx.fillText('Уворачивайся от кубиков!', W*0.65, H*0.56);
    ctx.fillStyle='#888'; ctx.font=scaledFont(Math.min(H*0.042, 14));
    ctx.fillText('Но от STROKA не уйдёшь...', W*0.65, H*0.68);

    const blink=Math.floor(frame/32)%2;
    ctx.fillStyle=blink?'#ffd700':'#ff6600';
    ctx.font=scaledFont(Math.min(H*0.058, 20),'bold');
    ctx.fillText('Нажми / тапни чтобы начать', W*0.65, H*0.86);

  } else {
    // ── Portrait: stacked ──
    const ls = Math.min(W, H) * 0.11;
    const titleFs = Math.min(W*0.13, 66);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=scaledFont(titleFs,'bold',"'Arial Black',Arial");
    ctx.shadowBlur=25; ctx.shadowColor='#ff3300';
    ctx.fillStyle='#ffd700'; ctx.fillText('АРТИЩЕВ', W/2, H*0.20);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.fillText('DODGE', W/2, H*0.31);

    drawStrokaAvatar(W/2, H*0.50, ls);

    ctx.fillStyle='#ddd'; ctx.font=scaledFont(Math.min(W*0.046,21));
    ctx.fillText('Уворачивайся от кубиков!', W/2, H*0.67);
    ctx.fillStyle='#888'; ctx.font=scaledFont(Math.min(W*0.036,16));
    ctx.fillText('Но от STROKA не уйдёшь...', W/2, H*0.73);

    const blink=Math.floor(frame/32)%2;
    ctx.fillStyle=blink?'#ffd700':'#ff6600';
    ctx.font=scaledFont(Math.min(W*0.055,24),'bold');
    ctx.fillText('Нажми / тапни чтобы начать', W/2, H*0.87);
  }
}

// ─── WIN SCREEN ───────────────────────────────────────────────
function drawWinScreen() {
  ctx.fillStyle='rgba(0,8,25,0.93)'; ctx.fillRect(0,0,W,H);

  winParticles.forEach(p=>{
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation);
    ctx.globalAlpha=Math.min(1,p.life*1.5); ctx.fillStyle=p.color;
    if (p.type==='star')  { starPath(0,0,p.size,p.size*0.4,5); ctx.fill(); }
    else if (p.type==='rect') { ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.65); }
    else { ctx.beginPath(); ctx.arc(0,0,p.size/2,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });

  const land = isLandscape();
  const secs = Math.floor(surviveFrames/FPS);
  const pulse = 1+0.06*Math.sin(frame*0.09);

  if (land) {
    // ── Landscape win: logo left, text right ──
    const ls = Math.min(H*0.28, W*0.15);
    drawStrokaAvatar(W*0.2, H*0.44, ls);

    const fontSize = Math.min(H*0.26, W*0.14, 90);
    ctx.save();
    ctx.translate(W*0.63, H*0.38); ctx.scale(pulse,pulse);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=scaledFont(fontSize,'bold',"'Arial Black',Arial");
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText('STROKA',4,4); ctx.fillText('WIN!',4,fontSize*1.08+4);
    const tg1=ctx.createLinearGradient(-200,0,200,0);
    tg1.addColorStop(0,'#4dd0e1'); tg1.addColorStop(0.5,'#fff'); tg1.addColorStop(1,'#4dd0e1');
    ctx.fillStyle=tg1; ctx.fillText('STROKA',0,0);
    const tg2=ctx.createLinearGradient(-200,0,200,0);
    tg2.addColorStop(0,'#ffd700'); tg2.addColorStop(0.5,'#fff'); tg2.addColorStop(1,'#ffd700');
    ctx.fillStyle=tg2; ctx.fillText('WIN!',0,fontSize*1.08);
    ctx.restore();

    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#aaa'; ctx.font=scaledFont(Math.min(H*0.055,16));
    ctx.fillText(`Артищев уворачивался ${secs} с`, W*0.63, H*0.78);
    ctx.fillStyle='#666'; ctx.font=scaledFont(Math.min(H*0.045,14));
    ctx.fillText('но 300к так и не заплатил 😄', W*0.63, H*0.9);

  } else {
    // ── Portrait win ──
    const ls = u()*0.13;
    drawStrokaAvatar(W/2, H*0.24, ls);

    const fontSize = Math.min(W*0.21, 108);
    ctx.save();
    ctx.translate(W/2, H*0.49); ctx.scale(pulse,pulse);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=scaledFont(fontSize,'bold',"'Arial Black',Arial");
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText('STROKA',5,5); ctx.fillText('WIN!',5,fontSize*1.08+5);
    const tg1=ctx.createLinearGradient(-W*0.3,0,W*0.3,0);
    tg1.addColorStop(0,'#4dd0e1'); tg1.addColorStop(0.5,'#fff'); tg1.addColorStop(1,'#4dd0e1');
    ctx.fillStyle=tg1; ctx.fillText('STROKA',0,0);
    const tg2=ctx.createLinearGradient(-W*0.3,0,W*0.3,0);
    tg2.addColorStop(0,'#ffd700'); tg2.addColorStop(0.5,'#fff'); tg2.addColorStop(1,'#ffd700');
    ctx.fillStyle=tg2; ctx.fillText('WIN!',0,fontSize*1.08);
    ctx.restore();

    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#aaa'; ctx.font=scaledFont(Math.min(W*0.042,19));
    ctx.fillText(`Артищев уворачивался ${secs} секунд`, W/2, H*0.73);
    ctx.fillStyle='#666'; ctx.font=scaledFont(Math.min(W*0.036,16));
    ctx.fillText('но 300к так и не заплатил 😄', W/2, H*0.79);
  }

  const blink=Math.floor(frame/42)%2;
  ctx.fillStyle=blink?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.25)';
  ctx.font=scaledFont(Math.min(u()*0.037,16));
  ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('Нажми / тапни чтобы сыграть снова', W/2, H - safeBot - 12);
}

// ─── LOOP ─────────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
